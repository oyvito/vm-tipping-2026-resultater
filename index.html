<script>
const D = JSON.parse(document.getElementById('data').textContent);
const fmtTime = iso => new Date(iso).toLocaleString('no-NO',
  {weekday:'short', day:'numeric', month:'short', hour:'2-digit',
   minute:'2-digit', timeZone:'Europe/Oslo'});
const esc = s => String(s ?? '').replace(/[&<>"]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.getElementById('updated').textContent = D.updated
  ? `Oppdatert ${fmtTime(D.updated)} · ${D.finished} av 104 kamper spilt`
  : 'Venter på første oppdatering';

function renderBoard() {
  const el = document.getElementById('board');
  if (!D.leaderboard.length) {
    el.innerHTML = '<div class="empty">Ingen deltakere registrert ennå.</div>';
    return;
  }
  let rows = D.leaderboard.map(p => `
    <tr class="top${p.rank<=3?p.rank:''}">
      <td class="num">${p.rank}</td>
      <td>${esc(p.name)}${p.late ? ' <span title="Levert etter fristen">⏰</span>' : ''}</td>
      <td class="num"><strong>${p.total}</strong></td>
      <td class="num">${p.match_points}</td><td class="num">${p.group_points}</td>
      <td class="num">${p.exact}</td><td class="num">${p.groups_correct}</td>
    </tr>`).join('');
  const lateNote = D.leaderboard.some(p => p.late)
    ? `<div class="sub" style="margin-top:.5rem">⏰ Levert etter fristen:
       kamper påbegynt før innlevering teller ikke, og ${D.late_penalty} p
       er trukket fra.</div>` : '';
  el.innerHTML = `<table><thead><tr><th class="num">#</th><th>Navn</th>
    <th class="num">Poeng</th><th class="num">Kamp</th><th class="num">Gruppe</th>
    <th class="num">Eksakte</th><th class="num">Plasseringer</th></tr></thead>
    <tbody>${rows}</tbody></table>${lateNote}`;
}

function matchCard(g, open) {
  const teams = (g.home && g.away) ? `${esc(g.home)} – ${esc(g.away)}`
    : 'Lag ikke klare';
  let score = '';
  if (g.score) {
    score = `${g.score[0]}–${g.score[1]}`;
    let extra = [];
    if (g.et) extra.push(`e.o. ${g.et[0]}–${g.et[1]}`);
    if (g.pens) extra.push(`str. ${g.pens[0]}–${g.pens[1]}`);
    if (extra.length) score += ` <span class="mextra">(${extra.join(', ')})</span>`;
  }
  const status = g.status === 'FINISHED' ? ''
    : (g.status === 'IN_PLAY' || g.status === 'PAUSED')
      ? '<span class="live">PÅGÅR</span>'
      : `<span class="mextra">${fmtTime(g.utc)}</span>`;
  const flagNames = ['målsum','utfall','eksakt'];
  const tips = g.tips.map(t => `<tr>
      <td>${esc(t.n)}</td><td class="num">${t.s}</td>
      <td>${g.game > 72 ? esc(t.w||'') : ''}</td>
      <td class="num">${t.v ? '<span title="Levert etter at kampen startet — teller ikke">⏰</span>' : (t.p ?? '')}</td>
      <td>${t.v ? '' : (t.f||[]).map((on,i) =>
        `<span class="flag ${on?'on':''}">${flagNames[i]}</span>`).join('')}</td>
    </tr>`).join('');
  return `<details class="match" ${open?'open':''}>
    <summary>
      <span class="mnum">#${g.game} ${esc(g.stage)}${g.group?' '+esc(g.group):''}</span>
      <span class="mteams">${teams}</span>
      <span class="mscore">${score}</span> ${status}
    </summary>
    <div class="tips"><table><thead><tr><th>Deltaker</th><th class="num">Tips</th>
      <th>${g.game>72?'Videre':''}</th><th class="num">Poeng</th><th></th></tr></thead>
      <tbody>${tips || '<tr><td colspan=5 class="empty">Ingen tips</td></tr>'}</tbody>
    </table></div>
  </details>`;
}

function renderGames(el, games, open) {
  if (!games.length) {
    el.innerHTML = '<div class="empty">Ingen kamper å vise.</div>';
    return;
  }
  let html = '', lastDate = '';
  for (const g of games) {
    const d = new Date(g.utc).toLocaleDateString('no-NO',
      {weekday:'long', day:'numeric', month:'long', timeZone:'Europe/Oslo'});
    if (d !== lastDate) { html += `<div class="datehead">${d}</div>`; lastDate = d; }
    html += matchCard(g, open);
  }
  el.innerHTML = html;
}

function renderMatches() {
  const played = D.games.filter(g => g.score)
    .sort((a,b) => b.utc.localeCompare(a.utc));
  renderGames(document.getElementById('matches'), played, false);
}

function renderUpcoming() {
  const next = D.games.filter(g => !g.score && g.status !== 'FINISHED')
    .sort((a,b) => a.utc.localeCompare(b.utc)).slice(0, 16);
  renderGames(document.getElementById('upcoming'), next, false);
}

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  for (const id of ['board','matches','upcoming'])
    document.getElementById(id).hidden = (id !== b.dataset.tab);
});

renderBoard(); renderMatches(); renderUpcoming();
</script>
</body>
</html>
